<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barbearia Contorno</title>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#d4af37">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Barbearia">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginTela" class="login-container">

<img src="/logo.png" class="logo-login">

<h2>Acesso ao sistema</h2>

<input id="login" placeholder="Usuário">

<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- APP -->

<div id="app" style="display:none;">

<header>

<img src="/logo.png" class="logo-topo">

<nav class="menu">

<button onclick="abrir('vendas')">Vendas</button>

<button onclick="abrir('relatorio')">Relatório</button>

<button id="btnRelatorioBarbeiros" onclick="abrir('relatorioBarbeiros')" style="display:none">
Relatório dos Barbeiros
</button>

<button onclick="abrir('dashboard')">Dashboard</button>

<button onclick="abrir('ranking')">Ranking</button>

<button id="btnAdmin" onclick="abrir('admin')" style="display:none">
Administrador
</button>

</nav>

</header>

<main id="conteudo"></main>

</div>

<script src="script.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker
.register("/service-worker.js")
.then(() => console.log("Service Worker registrado"))
.catch(err => console.log("Erro no service worker", err));

});

}

</script>

</body>
</html>
